const OPTIONS = [
  { value: 1, label: "没有" },
  { value: 2, label: "很少" },
  { value: 3, label: "有时" },
  { value: 4, label: "经常" },
  { value: 5, label: "总是" },
];

let currentIdx = 0;
let answers = new Array(QUESTIONS.length).fill(null);

const root = document.getElementById("app");

function render() {
  if (currentIdx === -1) {
    renderResult();
    return;
  }
  if (currentIdx === QUESTIONS.length) {
    renderResult();
    return;
  }
  renderQuestion();
}

function renderStart() {
  root.innerHTML = `
    <div class="welcome">
      <h2>5 分钟测出你的中医体质</h2>
      <p>45 道简单判断题 · 5 选 1 · 出具 9 大体质雷达图</p>
      <button class="start-btn" onclick="startQuiz()">开始测试</button>
    </div>
  `;
}

function startQuiz() {
  currentIdx = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  render();
}

function renderQuestion() {
  const q = QUESTIONS[currentIdx];
  const progress = Math.round(((currentIdx + 1) / QUESTIONS.length) * 100);
  root.innerHTML = `
    <div class="progress-bar">
      <div class="progress-info">
        <span class="progress-text">第 <strong>${currentIdx + 1}</strong> / ${QUESTIONS.length} 题</span>
        <span class="progress-text">${progress}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width: ${progress}%"></div>
      </div>
    </div>
    <div class="question-card">
      <span class="q-num">${q.id}</span>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${OPTIONS.map((opt, i) => `
          <div class="option ${answers[currentIdx] === opt.value ? "selected" : ""}"
               onclick="selectOption(${opt.value})">
            ${opt.label}
          </div>
        `).join("")}
      </div>
      <div class="nav-bar">
        <button class="btn btn-prev" onclick="prev()" ${currentIdx === 0 ? "disabled" : ""}>上一题</button>
        <button class="btn btn-next" onclick="next()" ${answers[currentIdx] === null ? "disabled" : ""}>
          ${currentIdx === QUESTIONS.length - 1 ? "查看结果" : "下一题"}
        </button>
      </div>
    </div>
  `;
}

function selectOption(value) {
  answers[currentIdx] = value;
  renderQuestion();
  // Auto-advance after a brief moment
  setTimeout(() => {
    if (currentIdx < QUESTIONS.length - 1) {
      next();
    }
  }, 350);
}

function next() {
  if (currentIdx < QUESTIONS.length - 1) {
    currentIdx++;
    render();
  } else {
    currentIdx = QUESTIONS.length;
    render();
  }
}

function prev() {
  if (currentIdx > 0) {
    currentIdx--;
    render();
  }
}

function scoreAnswers() {
  // 1. Accumulate weighted scores per type
  const rawScores = {};
  const maxPossible = {};
  const typeIds = Object.keys(TYPE_NAMES);
  for (const t of typeIds) {
    rawScores[t] = 0;
    maxPossible[t] = 0;
  }

  for (let i = 0; i < QUESTIONS.length; i++) {
    const q = QUESTIONS[i];
    const a = answers[i];
    if (a === null) continue;
    for (const [typeId, weight] of Object.entries(q.weights)) {
      const contribution = ((a - 1) / 4.0) * weight;
      rawScores[typeId] += contribution;
      maxPossible[typeId] += weight;
    }
  }

  // 2. Convert to 0-100
  const standardScores = {};
  for (const t of typeIds) {
    if (maxPossible[t] > 0) {
      standardScores[t] = (rawScores[t] / maxPossible[t]) * 100;
    } else {
      standardScores[t] = 0;
    }
  }

  // 3. Balanced special handling
  const otherTypes = typeIds.filter((t) => t !== "balanced");
  const otherAvg = otherTypes.reduce((s, t) => s + standardScores[t], 0) / otherTypes.length;
  standardScores.balanced = Math.max(0, 100 - otherAvg);

  // 4. Rank
  const ranked = Object.entries(standardScores).sort((a, b) => b[1] - a[1]);
  return {
    main: ranked[0],
    sub: ranked[1],
    all: standardScores,
    ranked,
  };
}

function renderResult() {
  const result = scoreAnswers();
  const [mainId, mainScore] = result.main;
  const [subId, subScore] = result.sub;
  const mainData = CONSTITUTION_DATA[mainId];
  const subData = CONSTITUTION_DATA[subId];
  const allScores = result.all;
  const ranked = result.ranked;

  // Generate radar chart SVG
  const cx = 300, cy = 300, R = 180;
  const labelR = 230;
  const ids = Object.keys(TYPE_NAMES);
  const n = ids.length;
  const radarSvg = (() => {
    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">`;
    svg += '<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#1E293B"/></linearGradient><linearGradient id="radar" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#06B6D4"/><stop offset="50%" stop-color="#84CC16"/><stop offset="100%" stop-color="#F59E0B"/></linearGradient></defs>';
    svg += '<rect width="600" height="600" fill="url(#bg)"/>';
    for (let r of [0.25, 0.5, 0.75, 1.0]) {
      svg += `<circle cx="${cx}" cy="${cy}" r="${r * R}" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.5"/>`;
    }
    const points = [];
    for (let i = 0; i < n; i++) {
      const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
      const x = cx + R * Math.cos(angle);
      const y = cy + R * Math.sin(angle);
      points.push({ x, y });
      svg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#475569" stroke-width="0.5" opacity="0.5"/>`;
    }
    const polyPoints = points
      .map((p, i) => {
        const s = Math.min(100, Math.max(0, allScores[ids[i]]));
        const ratio = s / 100;
        return `${cx + R * ratio * Math.cos(-Math.PI / 2 + (2 * Math.PI * i) / n)},${cy + R * ratio * Math.sin(-Math.PI / 2 + (2 * Math.PI * i) / n)}`;
      })
      .join(" ");
    svg += `<polygon points="${polyPoints}" fill="url(#radar)" fill-opacity="0.4" stroke="#06B6D4" stroke-width="2"/>`;
    const labelMap = { qi_deficiency: "气虚", yang_deficiency: "阳虚", yin_deficiency: "阴虚", phlegm_dampness: "痰湿", damp_heat: "湿热", blood_stasis: "血瘀", qi_stagnation: "气郁", special: "特禀", balanced: "平和" };
    points.forEach((p, i) => {
      const label = labelMap[ids[i]];
      let tx = cx + labelR * Math.cos(-Math.PI / 2 + (2 * Math.PI * i) / n);
      let ty = cy + labelR * Math.sin(-Math.PI / 2 + (2 * Math.PI * i) / n);
      let anchor = "middle";
      if (tx < cx - 10) anchor = "end";
      else if (tx > cx + 10) anchor = "start";
      ty += 5;
      svg += `<text x="${tx}" y="${ty}" font-family="sans-serif" font-size="14" fill="#94A3B8" text-anchor="${anchor}" font-weight="bold">${label}</text>`;
    });
    svg += "</svg>";
    return svg;
  })();

  root.innerHTML = `
    <div class="result-card">
      <div class="result-title">🎉 你的中医体质报告</div>

      <div class="result-main">
        <div style="font-size: 14px; color: #94A3B8;">主体质</div>
        <div class="result-type">${mainData.emoji} ${TYPE_NAMES[mainId]}</div>
        <div class="result-tagline">${mainData.tagline}</div>
        <div style="font-size: 14px; color: #06B6D4; margin-top: 8px;">转化分: ${mainScore.toFixed(1)}</div>
      </div>

      <div style="text-align: center; margin-bottom: 16px;">
        <span style="background: #F0F9FF; color: #0E7490; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;">
          副体质: ${subData.emoji} ${TYPE_NAMES[subId]} (${subScore.toFixed(1)})
        </span>
      </div>

      <div class="radar-box">${radarSvg}</div>

      <div class="result-section">
        <div class="result-section-title">主要表现</div>
        <div class="result-features">
          ${mainData.features.map((f) => `<span class="feature-tag">${f}</span>`).join("")}
        </div>
      </div>

      <div class="result-section">
        <div class="result-section-title">🌿 饮食调养</div>
        <div class="result-text">${mainData.advice.diet}</div>
      </div>

      <div class="result-section">
        <div class="result-section-title">🏃 运动建议</div>
        <div class="result-text">${mainData.advice.exercise}</div>
      </div>

      <div class="result-section">
        <div class="result-section-title">🌙 作息建议</div>
        <div class="result-text">${mainData.advice.lifestyle}</div>
      </div>

      <div class="disclaimer">
        ⚠️ 本报告由 AI 生成，<strong>仅供娱乐和健康参考</strong>，<br>
        <strong>不构成医疗诊断、治疗或预防建议</strong>。<br>
        如有健康问题，请咨询专业医生。
      </div>

      <button class="restart-btn" onclick="currentIdx = -1; renderStart();">
        重新测试
      </button>
    </div>

    <div class="result-card" style="margin-top: 20px;">
      <div class="result-section-title">📊 你的 9 维得分全图</div>
      <table style="width: 100%; font-size: 14px; color: #475569;">
        ${ranked.map(([id, score]) => `
          <tr style="border-bottom: 1px solid #F1F5F9;">
            <td style="padding: 10px 0;">${CONSTITUTION_DATA[id].emoji} ${TYPE_NAMES[id]}</td>
            <td style="padding: 10px 0; text-align: right; font-weight: 600; color: ${score >= 30 ? "#06B6D4" : "#94A3B8"};">
              ${score.toFixed(1)}
            </td>
            <td style="padding: 10px 0; text-align: right; color: ${score >= 30 ? "#06B6D4" : "#94A3B8"};">
              ${score >= 30 ? "偏颇" : "平和"}
            </td>
          </tr>
        `).join("")}
      </table>
    </div>
  `;
}

renderStart();
</script>
</body>
</html>
