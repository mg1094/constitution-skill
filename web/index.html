  .bar-name { font-size: 13px; color: var(--ink); display: flex; align-items: center; gap: 5px; }
  .bar-name .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .bar-track {
    position: relative; height: 16px; background: var(--paper-2);

    border: 1px solid var(--line-soft);

  .bar-fill {
    height: 100%; border-radius: 999px;

  .bar-threshold {
    position: absolute; top: -2px; bottom: -2px; left: 30%;

  .bar-score { font-family: var(--serif); font-weight: 700; font-size: 14px; text-align: right; color: var(--ink); }
  .bar-score.muted { color: var(--ink-faint); font-weight: 500; }
  .bar-score .tick { font-size: 11px; }
  .bar-score .tick.ok { color: var(--jade); }
  .bar-score .tick.no { color: var(--ink-faint); }

  .disclaimer {
    margin: 0 28px 28px; padding: 16px 18px;
    background: rgba(181, 70, 47, 0.06);
    border: 1px solid rgba(181, 70, 47, 0.18);

  .btn-full {

  .btn-share { background: linear-gradient(135deg, var(--jade), var(--jade-deep)); color: #FBF6EA; }

  /* animations */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .anim { animation: fadeUp .55s cubic-bezier(.2,.8,.2,1) both; }
  .d1 { animation-delay: .05s; } .d2 { animation-delay: .15s; } .d3 { animation-delay: .25s; }
  .d4 { animation-delay: .35s; } .d5 { animation-delay: .45s; } .d6 { animation-delay: .55s; }

  @media (max-width: 560px) {
    .hero-type { font-size: 32px; }
    .q-text { font-size: 19px; }
    .hero-row { gap: 18px; }
    .ring-wrap { width: 116px; height: 116px; }
    .ring-num { font-size: 30px; }
  }
</style>

const OPTIONS = [

const CAT_NAMES = {

const THRESHOLD = 30;
const TYPE_ORDER = Object.keys(TYPE_NAMES);

let currentIdx = 0;
let answers = new Array(QUESTIONS.length).fill(null);
const root = document.getElementById("app");
const STORAGE_KEY = "tcm_quiz_progress";

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentIdx, answers }));
  } catch (e) { /* ignore */ }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!Array.isArray(data.answers) || data.answers.length !== QUESTIONS.length) return null;
    return data;
  } catch (e) { return null; }
}

function clearProgress() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
}

function showToast(message, duration = 2200) {
  let toast = document.getElementById("toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.id = "toast";
    toast.style.cssText = "position:fixed;left:50%;bottom:36px;transform:translateX(-50%);background:rgba(43,38,32,0.92);color:#FBF6EA;padding:12px 22px;border-radius:999px;font-size:13px;letter-spacing:1px;box-shadow:0 8px 24px rgba(0,0,0,0.18);opacity:0;transition:opacity .3s ease;z-index:1000;";
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  requestAnimationFrame(() => { toast.style.opacity = "1"; });
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.style.opacity = "0"; }, duration);
}

function render() {
  if (currentIdx >= QUESTIONS.length) { renderResult(); return; }
  renderQuestion();
}

function renderStart() {
  const progress = loadProgress();
  const hasProgress = progress && progress.currentIdx > 0 && progress.currentIdx < QUESTIONS.length;
  const resumeBtn = hasProgress
    ? `<button class="btn-primary" onclick="resumeQuiz()" style="margin-bottom:12px;">继 续 上 次 测 试</button>

    : `<button class="btn-primary" onclick="startQuiz(true)">开 始 辨 识</button>`;

  root.innerHTML = `

function resumeQuiz() {
  const data = loadProgress();
  if (!data) { startQuiz(true); return; }
  currentIdx = data.currentIdx;
  answers = data.answers;
  render();
}

function startQuiz(reset = false) {
  if (reset) clearProgress();
  currentIdx = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  render();
}

function renderQuestion() {
  const q = QUESTIONS[currentIdx];

function selectOption(value) {
  answers[currentIdx] = value;
  saveProgress();
  renderQuestion();
  setTimeout(() => { if (currentIdx < QUESTIONS.length - 1) next(); }, 280);
}
function next() {
  if (currentIdx < QUESTIONS.length - 1) { currentIdx++; saveProgress(); render(); }
  else { currentIdx = QUESTIONS.length; clearProgress(); render(); }
}
function prev() { if (currentIdx > 0) { currentIdx--; saveProgress(); render(); } }

// ---------- Keyboard shortcuts ----------
document.addEventListener("keydown", (e) => {
  if (currentIdx < 0 || currentIdx >= QUESTIONS.length) return;
  if (!document.querySelector(".question")) return;
  const key = e.key;
  if (key >= "1" && key <= "5") {
    e.preventDefault();
    selectOption(parseInt(key, 10));
  } else if (key === "ArrowRight" || key === "Enter") {
    e.preventDefault();
    if (answers[currentIdx] !== null) next();
  } else if (key === "ArrowLeft") {
    e.preventDefault();
    prev();
  }
});

// ---------- Scoring (mirrors skills/scoring.py) ----------
function scoreAnswers() {
  const raw = {}, max = {};
  for (const t of TYPE_ORDER) { raw[t] = 0; max[t] = 0; }

  for (let i = 0; i < QUESTIONS.length; i++) {
    const a = answers[i];
    if (a === null) continue;
    for (const [t, w] of Object.entries(QUESTIONS[i].weights)) {
      raw[t] += ((a - 1) / 4) * w;
      max[t] += w;
    }
  }

  const all = {};
  for (const t of TYPE_ORDER) all[t] = max[t] > 0 ? (raw[t] / max[t]) * 100 : 0;

  // balanced = 100 - avg(other 8)
  const others = TYPE_ORDER.filter((t) => t !== "balanced");
  const otherAvg = others.reduce((s, t) => s + all[t], 0) / others.length;
  all.balanced = Math.max(0, 100 - otherAvg);

  const established = {};
  for (const t of TYPE_ORDER) established[t] = all[t] >= THRESHOLD;

  const ranked = Object.entries(all).sort((a, b) => b[1] - a[1]);

  // main / sub with threshold (matches Python)
  const biasedEst = ranked.filter(([t]) => t !== "balanced" && established[t]);
  let mainType, mainScore, subType, subScore, isBalanced;
  if (biasedEst.length) {
    [mainType, mainScore] = biasedEst[0];
    const subCands = ranked.filter(([t]) => established[t] && t !== mainType);
    [subType, subScore] = subCands.length ? subCands[0] : [null, 0];
    isBalanced = false;
  } else {
    mainType = "balanced"; mainScore = all.balanced;
    const nb = ranked.filter(([t]) => t !== "balanced");
    [subType, subScore] = nb.length ? nb[0] : [null, 0];
    isBalanced = true;
  }

  return { mainType, mainScore, subType, subScore, all, ranked, established, isBalanced };
}

// ---------- Radar (themed) ----------
function buildRadar(allScores, mainId) {
  const size = 480, cx = 240, cy = 240, R = 168, labelR = 205;
  const n = TYPE_ORDER.length;
  const ang = (i) => -Math.PI / 2 + (2 * Math.PI * i) / n;
  const pt = (i, r) => [cx + r * Math.cos(ang(i)), cy + r * Math.sin(ang(i))];

  let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">`;
  s += `<defs>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBF6EA"/><stop offset="100%" stop-color="#F0E6CC"/>
    </radialGradient>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A7C59" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#B8893B" stop-opacity="0.45"/>
    </linearGradient>
  </defs>`;
  s += `<circle cx="${cx}" cy="${cy}" r="${R + 26}" fill="url(#rg)" stroke="#D9CFB8" stroke-width="1"/>`;

  // grid polygons
  for (const r of [0.25, 0.5, 0.75, 1.0]) {
    const pts = TYPE_ORDER.map((_, i) => pt(i, R * r).join(",")).join(" ");
    s += `<polygon points="${pts}" fill="none" stroke="#C9BC9C" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.6"/>`;
  }
  // threshold ring at 30%
  const thPts = TYPE_ORDER.map((_, i) => pt(i, R * (THRESHOLD / 100)).join(",")).join(" ");
  s += `<polygon points="${thPts}" fill="rgba(181,70,47,0.06)" stroke="#B5462F" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>`;

  // axes
  for (let i = 0; i < n; i++) {
    const [x, y] = pt(i, R);
    s += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#C9BC9C" stroke-width="0.8" opacity="0.5"/>`;
  }

  // data polygon
  const dataPts = TYPE_ORDER.map((t, i) => {
    const ratio = Math.max(0, Math.min(100, allScores[t])) / 100;
    return pt(i, R * ratio).join(",");
  }).join(" ");
  s += `<polygon points="${dataPts}" fill="url(#pg)" stroke="#4A7C59" stroke-width="2.2" stroke-linejoin="round"/>`;

  // vertices
  TYPE_ORDER.forEach((t, i) => {
    const ratio = Math.max(0, Math.min(100, allScores[t])) / 100;
    const [x, y] = pt(i, R * ratio);
    const isMain = t === mainId;
    s += `<circle cx="${x}" cy="${y}" r="${isMain ? 6 : 4}" fill="${TYPE_COLORS[t]}" stroke="#FBF6EA" stroke-width="2"/>`;
  });

  // labels
  TYPE_ORDER.forEach((t, i) => {
    const [lx, ly] = pt(i, labelR);
    let anchor = "middle";
    if (lx < cx - 8) anchor = "end";
    else if (lx > cx + 8) anchor = "start";
    const short = TYPE_SHORT[t];
    const isMain = t === mainId;
    s += `<text x="${lx}" y="${ly + 5}" font-family="Noto Serif SC, serif" font-size="${isMain ? 17 : 14}" font-weight="${isMain ? 900 : 700}" fill="${isMain ? TYPE_COLORS[t] : '#6B6258'}" text-anchor="${anchor}">${short}</text>`;
    s += `<text x="${lx}" y="${ly + 20}" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#9A9082" text-anchor="${anchor}">${Math.round(allScores[t])}</text>`;
  });

  s += `</svg>`;
  return s;
}

// ---------- Score ring ----------
function buildRing(score, color) {
  const r = 56, c = 2 * Math.PI * r, pct = Math.max(0, Math.min(100, score)) / 100;
  const dash = (c * pct).toFixed(1);
  return `
    <div class="ring-wrap">
      <svg width="132" height="132" viewBox="0 0 132 132">
        <defs><linearGradient id="ringg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="${color}"/><stop offset="100%" stop-color="#B8893B"/>
        </linearGradient></defs>
        <circle cx="66" cy="66" r="${r}" fill="none" stroke="#E6DCC4" stroke-width="9"/>
        <circle cx="66" cy="66" r="${r}" fill="none" stroke="url(#ringg)" stroke-width="9"
          stroke-linecap="round" stroke-dasharray="${dash} ${c}" />
      </svg>
      <div class="ring-center">
        <div class="ring-num">${score.toFixed(0)}</div>
        <div class="ring-lbl">转化分</div>
      </div>
    </div>`;
}

      <div class="result-body">

      </div>

        <div class="section anim d5">

        如有健康问题，请咨询专业中医师。体质会随季节、年龄、生活方式变化，建议每 3-6 个月复测。

    <div class="card" style="padding:28px;margin-top:16px;">
      <div style="text-align:center;padding:20px;">
        <div style="font-size:14px;color:var(--ink-faint);letter-spacing:2px;margin-bottom:12px;">AI 正在解读您的体质...</div>
        <div style="font-size:28px;">🌿🤔📝</div>
        <div style="font-size:13px;color:var(--ink-faint);margin-top:12px;">通义千问正在生成个性化建议</div>
      </div>
    </div>
  `;
  aiBox.scrollIntoView({ behavior: "smooth" });

  const r = scoreAnswers();
  const payload = {
    model: "qwen-plus",
    messages: [
      { role: "system", content: `你是一位经验丰富的中医体质辨识专家。根据体质检测结果生成个性化解读。语言通俗易懂，温暖亲切。必须在末尾加免责声明。使用中文和 Markdown 格式。` },
      { role: "user", content: buildAIPrompt(r) }
    ],
    temperature: 0.7,
    max_tokens: 2000,
  };

  const apiKey = localStorage.getItem("tcm_api_key") || "";
  const baseUrl = localStorage.getItem("tcm_base_url") || "https://dashscope.aliyuncs.com/compatible-mode/v1";
  const model = localStorage.getItem("tcm_model") || "qwen-plus";

  payload.model = model;

  fetch(`${baseUrl}/chat/completions`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${apiKey}`,
    },
    body: JSON.stringify(payload),
  })
  .then(res => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  })
  .then(data => {
    const content = data.choices?.[0]?.message?.content || "AI 解读生成失败";
    aiBox.innerHTML = `
      <div class="card" style="padding:28px;margin-top:16px;">
        <div class="section-title" style="margin-bottom:16px;">🤖 AI 深度解读 <span class="en">AI REPORT</span></div>
        <div class="ai-content" style="font-size:14px;line-height:1.8;color:var(--ink-soft);white-space:pre-wrap;">${formatMarkdown(content)}</div>
      </div>
    `;
    aiBox.scrollIntoView({ behavior: "smooth" });
  })
  .catch(err => {
    aiBox.innerHTML = `
      <div class="card" style="padding:28px;margin-top:16px;">
        <div style="text-align:center;padding:20px;">
          <div style="font-size:14px;color:var(--cinnabar);margin-bottom:12px;">⚠️ AI 解读暂不可用</div>
          <div style="font-size:13px;color:var(--ink-faint);line-height:1.6;">
            ${err.message}<br><br>
            需要配置 API Key 才能使用 AI 解读功能。<br>
            点击下方按钮设置。
          </div>
          <button class="btn-full btn-ai" style="margin-top:16px;" onclick="showAPIConfig()">⚙️ 设置 API</button>
        </div>
      </div>
    `;
  });
}

function buildAIPrompt(r) {
  const scores = r.ranked.map(([id, score]) => {
    const name = TYPE_NAMES[id];
    const est = r.established[id] ? "✅成立" : "❌不成立";
    return `  ${name}: ${score.toFixed(1)}分 ${est}`;
  }).join("\n");

  return `请根据以下中医体质检测结果生成个性化解读报告。

主体质: ${TYPE_NAMES[r.mainType]}（转化分: ${r.mainScore.toFixed(1)}）
副体质: ${r.subType ? TYPE_NAMES[r.subType] : "无"}（转化分: ${r.subScore?.toFixed(1) || 0}）
是否平和体质: ${r.isBalanced ? "是" : "否"}

九维得分:
${scores}

请生成：1.体质总评 2.主要特征解读 3.饮食建议 4.运动建议 5.起居建议 6.情志调节 7.健康风险提醒 8.免责声明`;
}

function formatMarkdown(text) {
  return text
    .replace(/^### (.+)$/gm, '<h3 style="font-family:var(--serif);font-size:16px;color:var(--jade-deep);margin:16px 0 8px;">$1</h3>')
    .replace(/^## (.+)$/gm, '<h2 style="font-family:var(--serif);font-size:18px;color:var(--ink);margin:20px 0 10px;">$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--ink);">$1</strong>')
    .replace(/^> (.+)$/gm, '<blockquote style="border-left:3px solid var(--gold);padding-left:12px;margin:8px 0;color:var(--ink-soft);">$1</blockquote>')
    .replace(/\n/g, '<br>');
}

function showAPIConfig() {
  const key = localStorage.getItem("tcm_api_key") || "";
  const url = localStorage.getItem("tcm_base_url") || "https://dashscope.aliyuncs.com/compatible-mode/v1";
  const mdl = localStorage.getItem("tcm_model") || "qwen-plus";

  const html = `
    <div class="card" style="padding:28px;margin-top:16px;">
      <div class="section-title" style="margin-bottom:16px;">⚙️ API 配置 <span class="en">SETTINGS</span></div>
      <div style="font-size:13px;color:var(--ink-soft);line-height:1.8;margin-bottom:16px;">
        配置通义千问 API 后即可使用 AI 深度解读功能。<br>
        API Key 仅存储在本地浏览器，不会上传。
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div>
          <label style="font-size:12px;color:var(--ink-faint);">API Key</label>
          <input id="cfg-key" type="password" value="${key}" placeholder="sk-..." style="width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-top:4px;background:var(--paper-3);">
        </div>
        <div>
          <label style="font-size:12px;color:var(--ink-faint);">Base URL</label>
          <input id="cfg-url" type="text" value="${url}" style="width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-top:4px;background:var(--paper-3);">
        </div>
        <div>
          <label style="font-size:12px;color:var(--ink-faint);">模型</label>
          <input id="cfg-model" type="text" value="${mdl}" style="width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-top:4px;background:var(--paper-3);">
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:20px;">
        <button class="btn-full btn-ai" onclick="saveAPIConfig()">保 存</button>
        <button class="btn-full btn-ghost" onclick="document.getElementById('ai-result').style.display='none';">取 消</button>
      </div>
    </div>
  `;
  document.getElementById("ai-result").innerHTML = html;
  document.getElementById("ai-result").style.display = "block";
}

function saveAPIConfig() {
  localStorage.setItem("tcm_api_key", document.getElementById("cfg-key").value);
  localStorage.setItem("tcm_base_url", document.getElementById("cfg-url").value);
  localStorage.setItem("tcm_model", document.getElementById("cfg-model").value);
  document.getElementById("ai-result").innerHTML = `
    <div class="card" style="padding:28px;margin-top:16px;text-align:center;">
      <div style="font-size:14px;color:var(--jade);">✅ 配置已保存</div>
      <div style="font-size:13px;color:var(--ink-faint);margin-top:8px;">现在可以点击「AI 深度解读」了</div>
    </div>
  `;
  setTimeout(() => {
    document.getElementById("ai-result").style.display = "none";
  }, 2000);
}

function restart() {
  currentIdx = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  clearProgress();
  renderStart();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function generateReportMarkdown() {
  const r = scoreAnswers();
  const mainData = CONSTITUTION_DATA[r.mainType];
  const subData = r.subType ? CONSTITUTION_DATA[r.subType] : null;
  const date = new Date().toLocaleString("zh-CN");

  let md = `# 中医体质检测报告\n\n`;
  md += `**检测时间**：${date}\n\n`;
  md += `## 主体质：${mainData.emoji} ${TYPE_NAMES[r.mainType]}\n\n`;
  md += `- 转化分：${r.mainScore.toFixed(1)}\n`;
  md += `- 标签：${mainData.tagline}\n`;
  md += `- 整体判定：${r.isBalanced ? "🌿 平和体质 · 无明显偏颇" : "⚠ 偏颇体质 · 建议调养"}\n\n`;

  if (subData) {
    md += `## 副体质：${subData.emoji} ${TYPE_NAMES[r.subType]}\n\n`;
    md += `- 转化分：${r.subScore.toFixed(1)}\n`;
    md += `- 标签：${subData.tagline}\n\n`;
  }

  md += `## 主要表现\n\n`;
  mainData.features.forEach(f => { md += `- ${f}\n`; });
  md += `\n## 调养建议\n\n`;
  md += `**饮食**：${mainData.advice.diet}\n\n`;
  md += `**运动**：${mainData.advice.exercise}\n\n`;
  md += `**作息**：${mainData.advice.lifestyle}\n\n`;

  md += `## 九维得分\n\n`;
  md += `| 体质 | 转化分 | 判定 |\n`;
  md += `|------|--------|------|\n`;
  r.ranked.forEach(([id, score]) => {
    const est = r.established[id] ? "✓ 成立" : "— 不成立";
    md += `| ${TYPE_NAMES[id]} | ${score.toFixed(1)} | ${est} |\n`;
  });

  md += `\n---\n\n`;
  md += `⚠️ 本报告由算法依据自评问卷生成，**仅供健康养生参考**，**不构成医疗诊断、治疗或预防建议**。如有健康问题，请咨询专业中医师。`;
  return md;
}

async function shareReport() {
  const md = generateReportMarkdown();
  try {
    await navigator.clipboard.writeText(md);
    showToast("📋 报告已复制到剪贴板");
  } catch (err) {
    // Fallback
    const textarea = document.createElement("textarea");
    textarea.value = md;
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand("copy");
      showToast("📋 报告已复制到剪贴板");
    } catch (e) {
      showToast("复制失败，请手动保存报告");
    }
    document.body.removeChild(textarea);
  }
}

renderStart();
</script>
</body>
</html>
